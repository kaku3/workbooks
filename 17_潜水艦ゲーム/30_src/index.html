<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>深海潜水艦バトル</title>

  <!-- PeerJS -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <!-- Google Fonts & Material Symbols -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/lobby.css">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/board.css">
  <link rel="stylesheet" href="css/panel.css">
  <link rel="stylesheet" href="css/overlay.css">
</head>
<body>

<!-- ========== ロビー画面 ========== -->
<div id="lobby-screen">
  <h1 class="lobby-title">SUBMARINE BATTLE</h1>
  <p class="lobby-subtitle">3〜6人で遊ぶ深海タクティカル海戦ストラテジー</p>

  <div class="lobby-box">
    <div class="lobby-field">
      <label>プレイヤー名</label>
      <input type="text" id="player-name" placeholder="名前を入力" maxlength="12">
    </div>

    <div class="lobby-field" id="max-players-field">
      <label>最大人数</label>
      <div class="player-count-select">
        <label><input type="radio" name="max-players" value="3"><span>3</span></label>
        <label><input type="radio" name="max-players" value="4"><span>4</span></label>
        <label><input type="radio" name="max-players" value="5"><span>5</span></label>
        <label><input type="radio" name="max-players" value="6" checked><span>6</span></label>
      </div>
    </div>

    <div class="lobby-field" id="room-id-field">
      <label>ルームID（参加時）</label>
      <input type="text" id="room-id-input" placeholder="ホストのルームIDを入力">
    </div>

    <div class="lobby-actions" id="lobby-actions">
      <button class="btn btn-primary" id="create-room-btn">
        <span class="material-symbols-outlined">add_circle</span>ルーム作成
      </button>
      <button class="btn" id="join-room-btn">
        <span class="material-symbols-outlined">login</span>参加
      </button>
    </div>

    <div id="room-url"></div>
    <div id="lobby-players"></div>
    <p id="lobby-status"></p>
    <button class="btn btn-primary hidden" id="start-game-btn">
      <span class="material-symbols-outlined">play_arrow</span>ゲーム開始
    </button>
  </div>
</div>

<!-- ========== ゲーム画面 ========== -->
<div id="game-screen" class="hidden">

  <!-- ヘッダー: フェーズ + タイマー -->
  <header class="game-header">
    <span id="phase-display">ターン 1 - ドローフェーズ</span>
    <div class="game-header-right">
      <div class="timer-box">
        <span class="material-symbols-outlined">timer</span>
        <span id="timer-display">--</span>
      </div>
    </div>
  </header>

  <!-- プレイヤーストリップ (上部横並び) -->
  <div class="player-strip">
    <div id="player-list"></div>
  </div>

  <!-- 盤面＋操作パネル包括ラッパー -->
  <div class="game-body">

  <!-- 盤面（全幅・残り全高） -->
  <main class="panel-center">
    <div class="board-wrapper">
      <canvas id="board-canvas" width="500" height="500"></canvas>
      <div id="board-place-overlay" class="hidden"></div>
      <div id="dogfight-banner" class="hidden"></div>
      <!-- 行動フェーズ: 現在実行中アクション表示カード -->
      <div id="action-event-card" class="hidden">
        <span class="material-symbols-outlined" id="ae-icon">rocket_launch</span>
        <div class="ae-body">
          <div id="ae-label"></div>
          <div id="ae-sub"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- フェーズ切り替えオーバーレイ -->
  <div id="phase-overlay">
    <div class="phase-overlay-title"></div>
    <div class="phase-overlay-sub"></div>
  </div>

  <!-- フッター: 単位時間バー + 操作パネル + キュー + ログ -->
  <footer class="game-footer">

    <!-- 行1: 単位時間バー + コマンド確定 -->
    <div class="footer-row-time">
      <div class="time-bar-container time-wide">
        <div class="time-fill" id="time-fill" style="width:100%"></div>
        <span id="time-label">10 / 10</span>
      </div>
      <div id="command-area" class="hidden">
        <button class="btn btn-primary" id="confirm-btn" disabled>
          <span class="material-symbols-outlined">check_circle</span>確定
        </button>
        <div id="cmd-waiting" class="hidden"></div>
      </div>
    </div>

    <!-- 操作パネル: 左=移動/索敵 十字キー | 右=武器/設置/防御 在庫 -->
    <div class="op-panel hidden" id="op-panel">

      <!-- 左パネル: 移動・ソナー 十字キー配置 -->
      <div class="op-left">
        <div class="op-section-label">移動 / 索敵</div>
        <div class="crosspad">
          <button class="op-btn move-btn" data-op="turn_left">
            <span class="material-symbols-outlined">turn_left</span>
            <span class="op-name">←旋回</span>
            <span class="op-cost">3</span>
          </button>
          <button class="op-btn move-btn" data-op="forward">
            <span class="material-symbols-outlined">arrow_upward</span>
            <span class="op-name">前進</span>
            <span class="op-cost">1</span>
          </button>
          <button class="op-btn move-btn" data-op="turn_right">
            <span class="material-symbols-outlined">turn_right</span>
            <span class="op-name">旋回→</span>
            <span class="op-cost">3</span>
          </button>
          <button class="op-btn move-btn" data-op="strafe_l">
            <span class="material-symbols-outlined">arrow_back</span>
            <span class="op-name">←横移</span>
            <span class="op-cost">2</span>
          </button>
          <button class="op-btn sonar-btn" data-op="sonar">
            <span class="material-symbols-outlined">radar</span>
            <span class="op-name">ソナー</span>
            <span class="op-cost">1</span>
          </button>
          <button class="op-btn move-btn" data-op="strafe_r">
            <span class="material-symbols-outlined">arrow_forward</span>
            <span class="op-name">横移→</span>
            <span class="op-cost">2</span>
          </button>
        </div>
      </div>

      <!-- 右パネル: カテゴリ別在庫 -->
      <div class="op-right">
        <div class="inv-row-group">
          <div class="inv-section">
            <div class="inv-section-label">武器</div>
            <div class="inv-row">
              <button class="op-btn inv-btn" data-op="torpedo">
                <span class="material-symbols-outlined">rocket_launch</span>
                <span class="op-name">魚雷</span>
                <span class="op-cost">1</span>
                <span class="inv-count" id="inv-torpedo">×3</span>
              </button>
              <button class="op-btn inv-btn" data-op="guided">
                <span class="material-symbols-outlined">assistant_navigation</span>
                <span class="op-name">追尾魚雷</span>
                <span class="op-cost">2</span>
                <span class="inv-count" id="inv-guided">×2</span>
              </button>
              <button class="op-btn inv-btn" data-op="shotgun">
                <span class="material-symbols-outlined">scatter_plot</span>
                <span class="op-name">散弾</span>
                <span class="op-cost">1</span>
                <span class="inv-count" id="inv-shotgun">×2</span>
              </button>
            </div>
          </div>
          <div class="inv-section">
            <div class="inv-section-label">防御</div>
            <div class="inv-row">
              <button class="op-btn inv-btn defense-btn" data-op="chaff">
                <span class="material-symbols-outlined">blur_on</span>
                <span class="op-name">チャフ</span>
                <span class="op-cost">1</span>
                <span class="inv-count" id="inv-chaff">×2</span>
              </button>
              <button class="op-btn inv-btn defense-btn" data-op="armor">
                <span class="material-symbols-outlined">shield</span>
                <span class="op-name">装甲板</span>
                <span class="op-cost">2</span>
                <span class="inv-count" id="inv-armor">×2</span>
              </button>
            </div>
          </div>
        </div>
        <div class="inv-section inv-section-place">
          <div class="inv-section-label">設置</div>
          <div class="inv-row">
            <button class="op-btn inv-btn" data-op="decoy">
              <span class="material-symbols-outlined">help_outline</span>
              <span class="op-name">デコイ</span>
              <span class="op-cost">1</span>
              <span class="inv-count" id="inv-decoy">×2</span>
            </button>
            <button class="op-btn inv-btn" data-op="mine">
              <span class="material-symbols-outlined">dangerous</span>
              <span class="op-name">機雷</span>
              <span class="op-cost">1</span>
              <span class="inv-count" id="inv-mine">×2</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- アクションキュー -->
    <div id="action-queue"></div>

    <!-- ターンログ -->
    <div id="turn-log"></div>

  </footer>
  </div><!-- /.game-body -->
</div>

<!-- カードターゲット選択モーダル -->
<div id="card-modal" class="card-modal-overlay hidden">
  <div class="card-modal-box">
    <div class="card-modal-title" id="card-modal-title">カードを使用</div>
    <div class="card-modal-body" id="card-modal-body"></div>
    <div class="card-modal-actions">
      <button class="btn" id="card-modal-cancel">キャンセル</button>
      <button class="btn btn-primary" id="card-modal-ok" disabled>決定</button>
    </div>
  </div>
</div>

<!-- ゲームオーバーオーバーレイ -->
<div id="game-over-overlay" class="hidden"></div>

<!-- トーストコンテナ -->
<div class="toast-container" id="toast-container"></div>

<!-- エントリ -->
<script type="module">
  import { initLobby } from './js/lobby.js';
  initLobby();
</script>

</body>
</html>
